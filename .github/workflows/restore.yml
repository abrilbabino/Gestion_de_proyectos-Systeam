name: Restore Database
on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/889190443263/locations/global/workloadIdentityPools/gh-pool-tofu/providers/gh-provider-tofu'
          service_account: 'tofu-runner@project-1944cf83-7f15-4f33-89b.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download latest backup from GCS
        run: |
          LATEST=$(gcloud storage ls gs://systeam/backups/ | sort | tail -1)
          gcloud storage cp $LATEST backup.sql

      - name: Install PostgreSQL 17 Client
        run: |
          # Instalación forzada de versión 17 para asegurar compatibilidad con Supabase
          sudo apt-get update
          sudo apt-get install -y gnupg2 wget lsb-release
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Reset public schema contents
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_URL_PRUEBA }}
        run: |
          /usr/lib/postgresql/17/bin/psql -d "$PGPASSWORD" <<'EOF'
          DO $$ DECLARE
              r RECORD;
          BEGIN
              FOR r IN (SELECT table_name FROM information_schema.views WHERE table_schema = 'public') LOOP
                  EXECUTE 'DROP VIEW IF EXISTS public.' || quote_ident(r.table_name) || ' CASCADE';
              END LOOP;

              FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public') LOOP
                  EXECUTE 'DROP TABLE IF EXISTS public.' || quote_ident(r.tablename) || ' CASCADE';
              END LOOP;

              FOR r IN (SELECT typname FROM pg_type t JOIN pg_namespace n ON n.oid = t.typnamespace WHERE n.nspname = 'public' AND t.typtype = 'e') LOOP
                  EXECUTE 'DROP TYPE IF EXISTS public.' || quote_ident(r.typname) || ' CASCADE';
              END LOOP;

              FOR r IN (
                  SELECT p.oid::regprocedure AS func_signature
                  FROM pg_proc p
                  JOIN pg_namespace n ON n.oid = p.pronamespace
                  WHERE n.nspname = 'public'
              ) LOOP
                  EXECUTE 'DROP FUNCTION IF EXISTS ' || r.func_signature || ' CASCADE';
              END LOOP;
          END $$;
          EOF

      - name: Restore database
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_URL_PRUEBA }}
        run: |
          # pg_dump inyecta 'CREATE SCHEMA public;' por defecto al usar '-n public'.
          # Como nuestro script preserva el esquema para no perder permisos, borramos esa línea del SQL.
          sed -e '/CREATE SCHEMA public;/d' -e '/CREATE SCHEMA "public";/d' backup.sql > backup_limpio.sql
          
          (echo "SET session_replication_role = 'replica';"; cat backup_limpio.sql) | /usr/lib/postgresql/17/bin/psql -d "$PGPASSWORD" --single-transaction -v ON_ERROR_STOP=1