name: Restore Database
on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/889190443263/locations/global/workloadIdentityPools/gh-pool-tofu/providers/gh-provider-tofu'
          service_account: 'tofu-runner@project-1944cf83-7f15-4f33-89b.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download latest backup from GCS
        run: |
          LATEST=$(gcloud storage ls gs://systeam/backups/ | sort | tail -1)
          gcloud storage cp $LATEST backup.sql

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Reset public schema contents (Preserving Supabase Roles)
        # Usamos PGPASSWORD para que psql no se quede colgado esperando la contraseña
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_URL_PRUEBA }}
        run: |
          psql -d "$PGPASSWORD" <<'EOF'
          DO $$ DECLARE
              r RECORD;
          BEGIN
              -- 1. Eliminar Vistas
              FOR r IN (SELECT table_name FROM information_schema.views WHERE table_schema = 'public') LOOP
                  EXECUTE 'DROP VIEW IF EXISTS public.' || quote_ident(r.table_name) || ' CASCADE';
              END LOOP;

              -- 2. Eliminar Tablas (El CASCADE arrastra índices, secuencias asociadas y llaves foráneas)
              FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public') LOOP
                  EXECUTE 'DROP TABLE IF EXISTS public.' || quote_ident(r.tablename) || ' CASCADE';
              END LOOP;

              -- 3. Eliminar Tipos Personalizados (Enums)
              FOR r IN (SELECT typname FROM pg_type t JOIN pg_namespace n ON n.oid = t.typnamespace WHERE n.nspname = 'public' AND t.typtype = 'e') LOOP
                  EXECUTE 'DROP TYPE IF EXISTS public.' || quote_ident(r.typname) || ' CASCADE';
              END LOOP;

              -- 4. Eliminar Funciones y Triggers Custom (Identificación exacta por firma de argumentos)
              FOR r IN (
                  SELECT p.oid::regprocedure AS func_signature
                  FROM pg_proc p
                  JOIN pg_namespace n ON n.oid = p.pronamespace
                  WHERE n.nspname = 'public'
              ) LOOP
                  EXECUTE 'DROP FUNCTION IF EXISTS ' || r.func_signature || ' CASCADE';
              END LOOP;
          END $$;
          EOF

      - name: Restore database
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_URL_PRUEBA }}
        run: |
          # El truco de 'replica' asegura compatibilidad total con tus archivos viejos (con cat) y los nuevos (con pg_dump)
          (echo "SET session_replication_role = 'replica';"; cat backup.sql) | psql -d "$PGPASSWORD" \
            --single-transaction \
            -v ON_ERROR_STOP=1