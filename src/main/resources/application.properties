spring.config.import=optional:file:.env[.properties]
spring.application.name=GestionDeProyectos

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/systeam}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=none
spring.main.allow-bean-definition-overriding=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/proyectos
spring.flyway.table=flyway_gestion_proyectos_history
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=true
spring.flyway.ignore-migration-patterns=*:missing
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false

server.port=8081

# Cache Configuration (Caffeine TTL 3s para replicas K8s)
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=3s

server.forward-headers-strategy=framework

# Didit KYC
didit.api-key=${DIDIT_API_KEY:}
didit.workflow-id=${DIDIT_WORKFLOW_ID:TU_UUID_AQUI}
didit.webhook-secret=${DIDIT_WEBHOOK_SECRET:}
didit.api-url=https://verification.didit.me
didit.return-url=${DIDIT_RETURN_URL:http://localhost:5173/perfil}

# Blockchain Sepolia
blockchain.rpc-url=${BLOCKCHAIN_RPC_URL}
blockchain.payment-gateway-address=${BLOCKCHAIN_PAYMENT_GATEWAY}
blockchain.project-token-address=${BLOCKCHAIN_PROJECT_TOKEN}
blockchain.usdc-address=${BLOCKCHAIN_USDC}
blockchain.treasury-address=${BLOCKCHAIN_TREASURY}
blockchain.private-key=${BLOCKCHAIN_PRIVATE_KEY}
blockchain.token-factory-address=${BLOCKCHAIN_TOKEN_FACTORY}
blockchain.investment-swap-address=${BLOCKCHAIN_INVESTMENT_SWAP}

# Blockchain ŌĆö Contratos nuevos Stage 1
blockchain.idea-token-address=${BLOCKCHAIN_IDEA_TOKEN:0x0000000000000000000000000000000000000000}
blockchain.ideafy-factory-address=${BLOCKCHAIN_IDEAFY_FACTORY:0x0000000000000000000000000000000000000000}
blockchain.offering-contract-address=${BLOCKCHAIN_OFFERING_CONTRACT:0x0000000000000000000000000000000000000000}
blockchain.dividend-distributor-address=${BLOCKCHAIN_DIVIDEND_DISTRIBUTOR:0x0000000000000000000000000000000000000000}
blockchain.idea-swap-address=${BLOCKCHAIN_IDEA_SWAP:0x0000000000000000000000000000000000000000}
blockchain.idea-marketplace-address=${BLOCKCHAIN_IDEA_MARKETPLACE:0x0000000000000000000000000000000000000000}
blockchain.idea-governance-address=${BLOCKCHAIN_IDEA_GOVERNANCE:0x0000000000000000000000000000000000000000}
blockchain.oracle-billing-address=${BLOCKCHAIN_ORACLE_BILLING:0x0000000000000000000000000000000000000000}

# Blockchain ŌĆö Event listener (INV-01)
blockchain.event-poll-interval=30000
blockchain.event-reconcile-interval=120000
app.tokens.max-ownership-percent=0.50
app.referral.base-url=${REFERRAL_BASE_URL:https://ideafy.lat/registro}

# Mail / SMTP
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
mail.from=${MAIL_FROM:noreply@ideafy.lat}
